  # ── Payments ──────────────────────────────────────────────────────────────────

  /payments/checkout:
    post:
      operationId: createCheckout
      summary: Create a checkout for a token pack
      tags: [payments]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tokenPackId]
              properties:
                tokenPackId: { type: string }
      responses:
        '200':
          description: Checkout created or instantly approved
          content:
            application/json:
              schema:
                type: object
                required: [status]
                properties:
                  status: { type: string, enum: [PENDING, APPROVED] }
                  checkoutUrl: { type: string, nullable: true }
                  tokensCredited: { type: integer, nullable: true }
        '400': { $ref: '#/components/responses/UnprocessableEntity' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /payments/ccbill/checkout:
    post:
      operationId: createCcbillCheckout
      summary: Create a CCBill token-pack checkout session
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCcbillCheckoutInput' }
      responses:
        '200':
          description: Checkout URL returned
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [paymentTransactionId, checkoutUrl]
                    properties:
                      paymentTransactionId: { type: string }
                      checkoutUrl: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Token pack not found or inactive
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /webhooks/ccbill:
    post:
      operationId: handleCcbillWebhook
      summary: CCBill payment webhook handler — idempotent, verifies signature
      security: []
      tags: [payments]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Webhook processed
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '400':
          description: Invalid signature or malformed payload
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

