openapi: 3.0.3
info:
  title: StreamYolo API
  version: 0.0.1
  description: Room-first live creator platform — rooms, tips, private sessions, tokens, CCBill.

servers:
  - url: http://localhost:3001
    description: Local dev

security:
  - bearerAuth: []

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Session token — delivered via Set-Cookie on login; also accepted as Bearer header for native clients.

  # ─── Reusable parameters ───────────────────────────────────────────────────
  parameters:
    Cursor:
      in: query
      name: cursor
      schema: { type: string }
      description: Opaque pagination cursor from previous page.
    Limit:
      in: query
      name: limit
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
    SearchQuery:
      in: query
      name: q
      schema: { type: string, minLength: 1, maxLength: 200 }

  # ─── Reusable responses ────────────────────────────────────────────────────
  responses:
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    Forbidden:
      description: Insufficient role or ownership
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
    UnprocessableEntity:
      description: Validation error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

  # ─── Schemas ───────────────────────────────────────────────────────────────
  schemas:

    # ── Primitives ────────────────────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error: { type: string }
        code: { type: string }

    PaginatedMeta:
      type: object
      required: [hasMore, nextCursor]
      properties:
        hasMore: { type: boolean }
        nextCursor:
          type: string
          nullable: true

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok: { type: boolean }

    # ── Users ─────────────────────────────────────────────────────────────────

    PublicUser:
      type: object
      required: [id, displayName, role, status, createdAt]
      properties:
        id: { type: string }
        displayName: { type: string }
        role:
          type: string
          enum: [VIEWER, CREATOR, ADMIN, MODERATOR]
        status:
          type: string
          enum: [ACTIVE, SUSPENDED, DELETED]
        createdAt: { type: string, format: date-time }

    WalletSummary:
      type: object
      required: [tokenBalance, reservedTokenBalance, lifetimePurchasedTokens, lifetimeSpentTokens]
      properties:
        tokenBalance: { type: integer }
        reservedTokenBalance: { type: integer }
        lifetimePurchasedTokens: { type: integer }
        lifetimeSpentTokens: { type: integer }

    LedgerEntryDto:
      type: object
      required: [id, type, amountTokens, balanceAfter, createdAt]
      properties:
        id: { type: string }
        type:
          type: string
          enum:
            - TOKEN_PURCHASE
            - TIP_SENT
            - TIP_RECEIVED
            - PRIVATE_SESSION_HOLD
            - PRIVATE_SESSION_CAPTURE
            - PRIVATE_SESSION_RELEASE
            - REFUND_REVERSAL
            - CHARGEBACK_REVERSAL
            - ADMIN_ADJUSTMENT
        amountTokens: { type: integer }
        balanceAfter: { type: integer }
        description:
          type: string
          nullable: true
        roomId:
          type: string
          nullable: true
        tipId:
          type: string
          nullable: true
        privateSessionId:
          type: string
          nullable: true
        paymentTransactionId:
          type: string
          nullable: true
        adminActionId:
          type: string
          nullable: true
        createdAt: { type: string, format: date-time }

    # ── Auth ──────────────────────────────────────────────────────────────────

    RegisterInput:
      type: object
      required: [email, password, displayName]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 8 }
        displayName: { type: string, minLength: 1, maxLength: 50 }
        role:
          type: string
          enum: [VIEWER, CREATOR]

    UpdateCurrentUserInput:
      type: object
      required: [displayName]
      properties:
        displayName: { type: string, minLength: 1, maxLength: 50 }

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }

    MeResponse:
      type: object
      required: [data]
      properties:
        data:
          type: object
          required: [user]
          properties:
            user: { $ref: '#/components/schemas/PublicUser' }
            wallet:
              type: object
              allOf:
                - { $ref: '#/components/schemas/WalletSummary' }
              nullable: true
            creatorProfile:
              type: object
              allOf:
                - { $ref: '#/components/schemas/CreatorProfileSummary' }
              nullable: true

    # ── Creator ───────────────────────────────────────────────────────────────

    CreatorSummary:
      type: object
      required: [id, userId, displayName, isLive]
      properties:
        id: { type: string }
        userId: { type: string }
        displayName: { type: string }
        avatarUrl:
          type: string
          nullable: true
        isLive: { type: boolean }
        status:
          type: string
          enum: [DRAFT, PENDING, ACTIVE, PAUSED, SUSPENDED, BANNED]

    CreatorProfileSummary:
      type: object
      required: [id, userId, status, isLive]
      properties:
        id: { type: string }
        userId: { type: string }
        status:
          type: string
          enum: [DRAFT, PENDING, ACTIVE, PAUSED, SUSPENDED, BANNED]
        isLive: { type: boolean }
        pendingTokenBalance: { type: integer }

    CreatorProfileDetail:
      type: object
      required: [id, userId, displayName, status, isLive, privateRateTokensPerMinute, minPrivateMinutes, privateViewerCamRequired, privateScreenShareAllowed, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        displayName: { type: string }
        bio:
          type: string
          nullable: true
        avatarUrl:
          type: string
          nullable: true
        logoUrl:
          type: string
          nullable: true
        bannerUrl:
          type: string
          nullable: true
        status:
          type: string
          enum: [DRAFT, PENDING, ACTIVE, PAUSED, SUSPENDED, BANNED]
        isLive: { type: boolean }
        currentRoomId:
          type: string
          nullable: true
        privateRateTokensPerMinute: { type: integer, minimum: 0 }
        minPrivateMinutes: { type: integer, minimum: 1 }
        privateViewerCamRequired: { type: boolean }
        privateScreenShareAllowed: { type: boolean }
        privateRulesText:
          type: string
          nullable: true
        payoutStatus: { type: string }
        pendingTokenBalance: { type: integer }
        createdAt: { type: string, format: date-time }

    UpdateCreatorProfileInput:
      type: object
      properties:
        bio: { type: string, maxLength: 1000 }
        avatarMediaId: { type: string }
        bannerMediaId: { type: string }
        logoMediaId: { type: string }
        privateRateTokensPerMinute: { type: integer, minimum: 0 }
        minPrivateMinutes: { type: integer, minimum: 1 }
        privateViewerCamRequired: { type: boolean }
        privateScreenShareAllowed: { type: boolean }
        privateRulesText: { type: string, maxLength: 2000 }

    # ── Rooms ─────────────────────────────────────────────────────────────────

    RoomCategory:
      type: string
      enum: [MALE, FEMALE, COUPLES, TRANS]

    RoomTagDto:
      type: object
      required: [slug, label]
      properties:
        slug: { type: string }
        label: { type: string }
        group:
          type: string
          nullable: true

    AdminTagDto:
      type: object
      required: [id, slug, label, sortOrder, isActive, createdAt]
      properties:
        id: { type: string }
        slug: { type: string }
        label: { type: string }
        group:
          type: string
          nullable: true
        sortOrder: { type: integer }
        isActive: { type: boolean }
        createdAt: { type: string, format: date-time }

    CreateTagInput:
      type: object
      required: [slug, label]
      properties:
        slug: { type: string }
        label: { type: string }
        group:
          type: string
          nullable: true
        sortOrder: { type: integer }

    UpdateTagInput:
      type: object
      properties:
        label: { type: string }
        group:
          type: string
          nullable: true
        sortOrder: { type: integer }
        isActive: { type: boolean }

    RoomTaxonomy:
      type: object
      required: [categories, tags, countries, popularCountryCodes]
      properties:
        categories:
          type: array
          items:
            type: object
            required: [value, label, slug]
            properties:
              value: { $ref: '#/components/schemas/RoomCategory' }
              label: { type: string }
              slug: { type: string }
        tags:
          type: array
          items: { $ref: '#/components/schemas/RoomTagDto' }
        countries:
          type: array
          items:
            type: object
            required: [code, name]
            properties:
              code: { type: string, minLength: 2, maxLength: 2 }
              name: { type: string }
        popularCountryCodes:
          type: array
          items: { type: string, minLength: 2, maxLength: 2 }

    RoomCard:
      type: object
      required: [id, slug, title, status, visibility, creator, viewerCount, privateAvailable, tags, createdAt]
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        status:
          type: string
          enum: [DRAFT, LIVE, ENDED, SUSPENDED, HIDDEN]
        visibility:
          type: string
          enum: [PUBLIC, UNLISTED]
        category:
          type: string
          nullable: true
          description: MALE, FEMALE, COUPLES, or TRANS when set
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
        countryName:
          type: string
          nullable: true
        tags:
          type: array
          items: { $ref: '#/components/schemas/RoomTagDto' }
        creator: { $ref: '#/components/schemas/CreatorSummary' }
        thumbnailUrl:
          type: string
          nullable: true
        viewerCount: { type: integer }
        privateAvailable: { type: boolean }
        privateRateTokensPerMinute:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }

    RoomDetail:
      type: object
      required: [id, slug, title, status, visibility, creator, viewerCount, privateRateTokensPerMinute, minPrivateMinutes, privateViewerCamRequired, privateScreenShareAllowed, tags, createdAt]
      properties:
        id: { type: string }
        slug: { type: string }
        title: { type: string }
        status:
          type: string
          enum: [DRAFT, LIVE, ENDED, SUSPENDED, HIDDEN]
        visibility:
          type: string
          enum: [PUBLIC, UNLISTED]
        category:
          type: string
          nullable: true
          description: MALE, FEMALE, COUPLES, or TRANS when set
        countryCode:
          type: string
          minLength: 2
          maxLength: 2
          nullable: true
        countryName:
          type: string
          nullable: true
        tags:
          type: array
          items: { $ref: '#/components/schemas/RoomTagDto' }
        creator: { $ref: '#/components/schemas/CreatorSummary' }
        thumbnailUrl:
          type: string
          nullable: true
        coverUrl:
          type: string
          nullable: true
        viewerCount: { type: integer }
        privateRateTokensPerMinute: { type: integer }
        minPrivateMinutes: { type: integer }
        privateViewerCamRequired: { type: boolean }
        privateScreenShareAllowed: { type: boolean }
        privateRulesText:
          type: string
          nullable: true
        goal:
          type: object
          allOf:
            - { $ref: '#/components/schemas/RoomGoalDto' }
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }

    PrepareRoomInput:
      type: object
      required: [title]
      properties:
        title: { type: string, minLength: 1, maxLength: 200 }
        visibility:
          type: string
          enum: [PUBLIC, UNLISTED]
        thumbnailMediaId: { type: string }
        coverMediaId: { type: string }
        category: { $ref: '#/components/schemas/RoomCategory' }
        countryCode: { type: string, minLength: 2, maxLength: 2 }
        tagSlugs:
          type: array
          items: { type: string }
          maxItems: 10
        saveAsDefaults:
          type: boolean
          default: true

    GoLiveEligibility:
      type: object
      required: [canGoLive, missing]
      properties:
        canGoLive: { type: boolean }
        missing:
          type: array
          items:
            type: string
            enum:
              - CREATOR_NOT_APPROVED
              - ROOM_THUMBNAIL
              - ROOM_TITLE
              - ROOM_CATEGORY
              - ROOM_COUNTRY
              - PRIVATE_RULES_TEXT
              - PRIVATE_RATE
              - TIP_MENU

    ViewerRoomState:
      type: object
      required: [canChat, canTip, canRequestPrivate, hasActivePrivateSession]
      properties:
        canChat: { type: boolean }
        canTip: { type: boolean }
        canRequestPrivate: { type: boolean }
        hasActivePrivateSession: { type: boolean }
        estimatedPrivateMinutes:
          type: integer
          nullable: true

    # ── Room menu ─────────────────────────────────────────────────────────────

    RoomMenuItemDto:
      type: object
      required: [id, label, tokenAmount, isActive, sortOrder]
      properties:
        id: { type: string }
        label: { type: string }
        description:
          type: string
          nullable: true
        tokenAmount: { type: integer }
        isActive: { type: boolean }
        sortOrder: { type: integer }

    RoomGoalDto:
      type: object
      required: [id, title, targetTokens, currentTokens]
      properties:
        id: { type: string }
        title: { type: string }
        targetTokens: { type: integer }
        currentTokens: { type: integer }

    # ── Creator menu items ────────────────────────────────────────────────────

    CreatorMenuItemDto:
      type: object
      required: [id, label, tokenAmount, isActive, sortOrder, createdAt]
      properties:
        id: { type: string }
        label: { type: string }
        description:
          type: string
          nullable: true
        tokenAmount: { type: integer }
        isActive: { type: boolean }
        sortOrder: { type: integer }
        createdAt: { type: string, format: date-time }

    CreateCreatorMenuItemInput:
      type: object
      required: [label, tokenAmount]
      properties:
        label: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 300 }
        tokenAmount: { type: integer, minimum: 1 }
        sortOrder: { type: integer, minimum: 0 }

    UpdateCreatorMenuItemInput:
      type: object
      properties:
        label: { type: string, minLength: 1, maxLength: 100 }
        description: { type: string, maxLength: 300 }
        tokenAmount: { type: integer, minimum: 1 }
        isActive: { type: boolean }
        sortOrder: { type: integer, minimum: 0 }

    # ── Chat ──────────────────────────────────────────────────────────────────

    ChatMessageDto:
      type: object
      required: [id, roomId, type, body, createdAt]
      properties:
        id: { type: string }
        roomId: { type: string }
        user:
          type: object
          allOf:
            - { $ref: '#/components/schemas/PublicUser' }
          nullable: true
        type:
          type: string
          enum:
            - USER_MESSAGE
            - CREATOR_MESSAGE
            - SYSTEM_MESSAGE
            - AUTO_MESSAGE
            - TIP_EVENT
            - MENU_EVENT
            - GOAL_EVENT
            - PRIVATE_REQUEST
            - MODERATION_EVENT
        body: { type: string }
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        createdAt: { type: string, format: date-time }
        deletedAt:
          type: string
          format: date-time
          nullable: true

    # ── Streamer moderation ──────────────────────────────────────────────────

    ModerationActionDto:
      type: object
      required: [id, roomId, creatorId, actorUserId, type, createdAt]
      properties:
        id: { type: string }
        roomId: { type: string }
        creatorId: { type: string }
        actorUserId: { type: string }
        targetUserId:
          type: string
          nullable: true
        targetMessageId:
          type: string
          nullable: true
        type:
          type: string
          enum: [MUTE, UNMUTE, KICK, BAN, UNBAN, DELETE_MESSAGE, PIN_MESSAGE, CLEAR_CHAT, SLOW_MODE, REWARD]
        reason:
          type: string
          nullable: true
        durationSeconds:
          type: integer
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          nullable: true
          additionalProperties: true
        createdAt: { type: string, format: date-time }

    RoomChatSettingsDto:
      type: object
      required: [roomId, slowModeSeconds]
      properties:
        roomId: { type: string }
        slowModeSeconds: { type: integer, minimum: 0 }
        pinnedMessage:
          type: object
          allOf:
            - { $ref: '#/components/schemas/ChatMessageDto' }
          nullable: true

    CreatorUserBanDto:
      type: object
      required: [id, creatorId, userId, createdById, createdAt]
      properties:
        id: { type: string }
        creatorId: { type: string }
        userId: { type: string }
        createdById: { type: string }
        reason:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }

    CreatorUserRewardDto:
      type: object
      required: [id, creatorId, userId, createdById, type, createdAt]
      properties:
        id: { type: string }
        creatorId: { type: string }
        userId: { type: string }
        createdById: { type: string }
        type:
          type: string
          enum: [SHOUTOUT, VIP, UNVIP]
        note:
          type: string
          nullable: true
        expiresAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }

    ModerateUserInput:
      type: object
      required: [targetUserId]
      properties:
        targetUserId: { type: string }
        reason: { type: string, maxLength: 500 }
        durationSeconds: { type: integer, minimum: 1 }

    RewardUserInput:
      type: object
      required: [targetUserId, type]
      properties:
        targetUserId: { type: string }
        type:
          type: string
          enum: [SHOUTOUT, VIP, UNVIP]
        note: { type: string, maxLength: 500 }
        durationSeconds: { type: integer, minimum: 1 }

    UpdateRoomChatSettingsInput:
      type: object
      properties:
        slowModeSeconds: { type: integer, minimum: 0, maximum: 300 }

    # ── Tips ──────────────────────────────────────────────────────────────────

    TipDto:
      type: object
      required: [id, roomId, fromUserId, toCreatorId, amountTokens, requestType, status, createdAt]
      properties:
        id: { type: string }
        roomId: { type: string }
        fromUserId: { type: string }
        toCreatorId: { type: string }
        amountTokens: { type: integer }
        requestType:
          type: string
          enum: [GENERAL, MENU_ITEM, CUSTOM, GOAL]
        menuItemId:
          type: string
          nullable: true
        requestText:
          type: string
          nullable: true
        status:
          type: string
          enum: [SENT, ACKNOWLEDGED, COMPLETED, DECLINED, REVERSED]
        createdAt: { type: string, format: date-time }

    CreateTipInput:
      type: object
      required: [amountTokens, requestType]
      properties:
        amountTokens: { type: integer, minimum: 1 }
        requestType:
          type: string
          enum: [GENERAL, MENU_ITEM, CUSTOM, GOAL]
        menuItemId: { type: string }
        requestText: { type: string, maxLength: 500 }

    # ── Token packs & Settings ───────────────────────────────────────────────

    PlatformSettingsDto:
      type: object
      required: [activePaymentProvider, tokenPurchasesEnabled]
      properties:
        activePaymentProvider: { type: string, enum: [CCBILL, DEMO] }
        tokenPurchasesEnabled: { type: boolean }

    TokenPackDto:
      type: object
      required: [id, name, priceCents, tokenAmount, bonusTokenAmount, currency, isActive, sortOrder]
      properties:
        id: { type: string }
        name: { type: string }
        priceCents: { type: integer }
        tokenAmount: { type: integer }
        bonusTokenAmount: { type: integer }
        currency: { type: string, enum: [USD] }
        isActive: { type: boolean }
        sortOrder: { type: integer }

    # ── Payments ──────────────────────────────────────────────────────────────

    PaymentTransactionDto:
      type: object
      required: [id, userId, tokenPackId, provider, status, amountCents, currency, tokensCredited, createdAt]
      properties:
        id: { type: string }
        userId: { type: string }
        tokenPackId: { type: string }
        provider: { type: string, enum: [CCBILL] }
        providerTxnId:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, DECLINED, FAILED, REFUNDED, CHARGEBACK, MANUAL_REVIEW]
        amountCents: { type: integer }
        currency: { type: string, enum: [USD] }
        tokensCredited: { type: integer }
        checkoutUrl:
          type: string
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }

    CreateCcbillCheckoutInput:
      type: object
      required: [tokenPackId]
      properties:
        tokenPackId: { type: string }

    # ── Private sessions ──────────────────────────────────────────────────────

    PrivateSessionDto:
      type: object
      required: [id, creatorId, viewerId, publicRoomId, status, rateTokensPerMinute, minMinutes, viewerCamRequired, screenShareAllowed, reservedTokens, capturedTokens, releasedTokens, requestedAt, createdAt]
      properties:
        id: { type: string }
        creatorId: { type: string }
        viewerId: { type: string }
        publicRoomId: { type: string }
        status:
          type: string
          enum: [REQUESTED, ACCEPTED, DECLINED, ACTIVE, ENDED, CANCELLED, EXPIRED, FORCE_ENDED]
        rateTokensPerMinute: { type: integer }
        minMinutes: { type: integer }
        viewerCamRequired: { type: boolean }
        screenShareAllowed: { type: boolean }
        rulesText:
          type: string
          nullable: true
        reservedTokens: { type: integer }
        capturedTokens: { type: integer }
        releasedTokens: { type: integer }
        livekitRoomName:
          type: string
          nullable: true
        requestedAt: { type: string, format: date-time }
        acceptedAt:
          type: string
          format: date-time
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        endedAt:
          type: string
          format: date-time
          nullable: true
        declineReason:
          type: string
          nullable: true
        createdAt: { type: string, format: date-time }

    RequestPrivateSessionInput:
      type: object
      properties:
        requestedMinutes: { type: integer, minimum: 1 }
        note: { type: string, maxLength: 300 }

    DeclinePrivateSessionInput:
      type: object
      properties:
        reason: { type: string, maxLength: 300 }

    # ── Media ─────────────────────────────────────────────────────────────────

    MediaAssetDto:
      type: object
      required: [id, ownerUserId, type, url, status, source, createdAt]
      properties:
        id: { type: string }
        ownerUserId: { type: string }
        creatorId:
          type: string
          nullable: true
        roomId:
          type: string
          nullable: true
        type:
          type: string
          enum: [AVATAR, LOGO, ROOM_COVER, ROOM_THUMBNAIL_CAPTURE, BANNER]
        url: { type: string }
        blurhash:
          type: string
          nullable: true
        dominantColor:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, APPROVED, REJECTED, REMOVED, HIDDEN]
        source:
          type: string
          enum: [UPLOADED, CREATOR_CAPTURED]
        createdAt: { type: string, format: date-time }

    # ── Reports ───────────────────────────────────────────────────────────────

    ReportDto:
      type: object
      required: [id, reporterId, targetType, reason, status, createdAt]
      properties:
        id: { type: string }
        reporterId: { type: string }
        targetType:
          type: string
          enum: [USER, ROOM, MESSAGE, MEDIA]
        targetUserId:
          type: string
          nullable: true
        targetRoomId:
          type: string
          nullable: true
        targetMessageId:
          type: string
          nullable: true
        targetMediaId:
          type: string
          nullable: true
        reason: { type: string }
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [PENDING, REVIEWED, ACTIONED, DISMISSED]
        adminNotes:
          type: string
          nullable: true
        reviewedAt:
          type: string
          format: date-time
          nullable: true
        createdAt: { type: string, format: date-time }

    CreateReportInput:
      type: object
      required: [targetType, reason]
      properties:
        targetType:
          type: string
          enum: [USER, ROOM, MESSAGE, MEDIA]
        targetUserId: { type: string }
        targetRoomId: { type: string }
        targetMessageId: { type: string }
        targetMediaId: { type: string }
        reason: { type: string, minLength: 1, maxLength: 200 }
        description: { type: string, maxLength: 2000 }

    ReviewReportInput:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [REVIEWED, ACTIONED, DISMISSED]
        adminNotes: { type: string, maxLength: 2000 }

    # ── Admin ─────────────────────────────────────────────────────────────────

    AdminOverviewMetrics:
      type: object
      required: [liveRoomCount, totalUsers, totalCreators, pendingReports, pendingPayments, activePrivateSessions]
      properties:
        liveRoomCount: { type: integer }
        totalUsers: { type: integer }
        totalCreators: { type: integer }
        pendingReports: { type: integer }
        pendingPayments: { type: integer }
        activePrivateSessions: { type: integer }
        totalTokensPurchasedToday: { type: integer }
        totalRevenueCentsToday: { type: integer }

    AdminUserDetail:
      type: object
      required: [user, wallet]
      properties:
        user: { $ref: '#/components/schemas/PublicUser' }
        wallet: { $ref: '#/components/schemas/WalletSummary' }
        creatorProfile:
          type: object
          allOf:
            - { $ref: '#/components/schemas/CreatorProfileDetail' }
          nullable: true

    AdminAdjustWalletInput:
      type: object
      required: [amountTokens, reason, adjustmentType]
      properties:
        amountTokens: { type: integer }
        reason: { type: string, minLength: 1, maxLength: 500 }
        adjustmentType: { type: string }

    SuspendUserInput:
      type: object
      required: [reason]
      properties:
        reason: { type: string, minLength: 1, maxLength: 500 }

    EndRoomInput:
      type: object
      properties:
        reason: { type: string, maxLength: 500 }

# ─────────────────────────────────────────────────────────────────────────────
# Paths
# ─────────────────────────────────────────────────────────────────────────────

paths:

  # ── Settings ──────────────────────────────────────────────────────────────────

  /settings:
    get:
      operationId: getPlatformSettings
      summary: Get public platform settings
      tags: [system]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema: { $ref: '#/components/schemas/PlatformSettingsDto' }

  # ── Auth ────────────────────────────────────────────────────────────────────

  /auth/register:
    post:
      operationId: register
      summary: Register a new account
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RegisterInput' }
      responses:
        '201':
          description: Registered — session cookie set
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/PublicUser' }
        '409':
          description: Email or username already exists
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  /auth/login:
    post:
      operationId: login
      summary: Login with email and password
      security: []
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LoginInput' }
      responses:
        '200':
          description: Authenticated — session cookie set
          headers:
            Set-Cookie:
              schema: { type: string }
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/PublicUser' }
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      operationId: logout
      summary: Logout and clear session
      tags: [auth]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }

  /auth/me:
    get:
      operationId: getCurrentUser
      summary: Get the current authenticated user
      tags: [auth]
      responses:
        '200':
          description: Current user with wallet and creator profile
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MeResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      operationId: updateCurrentUser
      summary: Update the current user's display name
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCurrentUserInput' }
      responses:
        '200':
          description: Updated user
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/PublicUser' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/UnprocessableEntity'

  # ── Rooms (public) ──────────────────────────────────────────────────────────

  /rooms:
    get:
      operationId: listRooms
      summary: List live public rooms
      security: []
      tags: [rooms]
      parameters:
        - in: query
          name: status
          schema: { type: string, enum: [LIVE, ENDED] }
        - in: query
          name: category
          schema:
            type: array
            items: { $ref: '#/components/schemas/RoomCategory' }
          style: form
          explode: true
        - in: query
          name: country
          schema:
            type: array
            items: { type: string, minLength: 2, maxLength: 2 }
          style: form
          explode: true
        - in: query
          name: tag
          schema:
            type: array
            items: { type: string }
          style: form
          explode: true
        - in: query
          name: q
          schema: { type: string }
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated room list
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RoomCard' }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }

  /rooms/taxonomy:
    get:
      operationId: getRoomTaxonomy
      summary: Room browse taxonomy (categories, tags, countries)
      security: []
      tags: [rooms]
      responses:
        '200':
          description: Taxonomy for room browse and prepare flows
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/RoomTaxonomy' }

  /rooms/{slug}:
    get:
      operationId: getRoom
      summary: Get a room by slug
      security: []
      tags: [rooms]
      parameters:
        - in: path
          name: slug
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Room detail with viewer state
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [room, viewerState]
                    properties:
                      room: { $ref: '#/components/schemas/RoomDetail' }
                      livekitToken:
                        type: string
                        nullable: true
                      viewerState: { $ref: '#/components/schemas/ViewerRoomState' }
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Creator rooms ────────────────────────────────────────────────────────────

  /creator/rooms:
    get:
      operationId: listCreatorRooms
      summary: List rooms created by the current creator
      tags: [creator-rooms]
      parameters:
        - $ref: '#/components/parameters/Cursor'
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Paginated room list for the authenticated creator
          content:
            application/json:
              schema:
                type: object
                required: [data, meta]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/RoomCard' }
                  meta: { $ref: '#/components/schemas/PaginatedMeta' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /creator/rooms/prepare:
    post:
      operationId: prepareRoom
      summary: Create or update the creator's draft room setup
      tags: [creator-rooms]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/PrepareRoomInput' }
      responses:
        '200':
          description: Room prepared
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [room, goLiveEligibility]
                    properties:
                      room: { $ref: '#/components/schemas/RoomDetail' }
                      goLiveEligibility: { $ref: '#/components/schemas/GoLiveEligibility' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /creator/rooms/{roomId}/go-live:
    post:
      operationId: goLive
      summary: Go live — creator must pass eligibility check (approved status + thumbnail + tip menu + private rules)
      tags: [creator-rooms]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Room is now LIVE with LiveKit credentials
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [room, livekitToken, livekitUrl]
                    properties:
                      room: { $ref: '#/components/schemas/RoomDetail' }
                      livekitToken: { type: string }
                      livekitUrl: { type: string }
        '400':
          description: Eligibility check failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  error: { type: string }
                  goLiveEligibility: { $ref: '#/components/schemas/GoLiveEligibility' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /creator/rooms/{roomId}/end:
    post:
      operationId: endRoom
      summary: End the creator's live room
      tags: [creator-rooms]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Room ended
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [room]
                    properties:
                      room: { $ref: '#/components/schemas/RoomDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Creator profile ──────────────────────────────────────────────────────────

  /creator/rooms/{roomId}/private-sessions:
    get:
      operationId: getCreatorPrivateSessions
      summary: Get private sessions for the creator's room
      tags: [private-sessions]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: List of private sessions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/PrivateSessionDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /creator/profile:
    get:
      operationId: getCreatorProfile
      summary: Get the authenticated creator's own profile
      tags: [creator-profile]
      responses:
        '200':
          description: Creator profile
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/CreatorProfileDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    patch:
      operationId: updateCreatorProfile
      summary: Update the authenticated creator's profile
      tags: [creator-profile]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCreatorProfileInput' }
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/CreatorProfileDetail' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /creator/menu-items:
    get:
      operationId: listCreatorMenuItems
      summary: List the creator's own menu items
      tags: [creator-menu]
      responses:
        '200':
          description: Creator menu items
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/CreatorMenuItemDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      operationId: createCreatorMenuItem
      summary: Create a new creator menu item
      tags: [creator-menu]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/CreateCreatorMenuItemInput' }
      responses:
        '201':
          description: Menu item created
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/CreatorMenuItemDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /creator/menu-items/{menuItemId}:
    patch:
      operationId: updateCreatorMenuItem
      summary: Update a creator menu item
      tags: [creator-menu]
      parameters:
        - in: path
          name: menuItemId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UpdateCreatorMenuItemInput' }
      responses:
        '200':
          description: Menu item updated
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data: { $ref: '#/components/schemas/CreatorMenuItemDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      operationId: deleteCreatorMenuItem
      summary: Delete a creator menu item
      tags: [creator-menu]
      parameters:
        - in: path
          name: menuItemId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Menu item deleted
          content:
            application/json:
              schema: { $ref: '#/components/schemas/OkResponse' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── LiveKit ──────────────────────────────────────────────────────────────────

  /livekit/token:
    post:
      operationId: getLivekitToken
      summary: Get a LiveKit participant token for a public room or private session
      tags: [livekit]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [appRoomType, appRoomId]
              properties:
                appRoomType:
                  type: string
                  enum: [PUBLIC_ROOM, PRIVATE_SESSION]
                appRoomId: { type: string }
      responses:
        '200':
          description: LiveKit token and URL
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [livekitUrl, token, roomName]
                    properties:
                      livekitUrl: { type: string }
                      token: { type: string }
                      roomName: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  # ── Chat ─────────────────────────────────────────────────────────────────────

  /rooms/{roomId}/messages:
    get:
      operationId: getRoomMessages
      summary: Get recent chat history for a room
      security: []
      tags: [chat]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Chat messages
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ChatMessageDto' }
        '404':
          $ref: '#/components/responses/NotFound'

  /creator/rooms/{roomId}/moderation/actions:
    get:
      operationId: listRoomModerationActions
      summary: List recent streamer moderation actions for a room
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
        - $ref: '#/components/parameters/Limit'
      responses:
        '200':
          description: Moderation actions
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/ModerationActionDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /creator/rooms/{roomId}/moderation/mute:
    post:
      operationId: muteRoomUser
      summary: Temporarily mute a viewer in the creator's room chat
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerateUserInput' }
      responses:
        '200':
          description: Viewer muted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [action]
                    properties:
                      action: { $ref: '#/components/schemas/ModerationActionDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /creator/rooms/{roomId}/moderation/unmute:
    post:
      operationId: unmuteRoomUser
      summary: Unmute a viewer in the creator's room chat
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerateUserInput' }
      responses:
        '200':
          description: Viewer unmuted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [action]
                    properties:
                      action: { $ref: '#/components/schemas/ModerationActionDto' }
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /creator/rooms/{roomId}/moderation/kick:
    post:
      operationId: kickRoomUser
      summary: Remove a viewer from the current room
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerateUserInput' }
      responses:
        '200':
          description: Viewer kicked
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [action]
                    properties:
                      action: { $ref: '#/components/schemas/ModerationActionDto' }

  /creator/rooms/{roomId}/moderation/ban:
    post:
      operationId: banCreatorUser
      summary: Ban a viewer from this creator's rooms
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerateUserInput' }
      responses:
        '200':
          description: Viewer banned
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [ban, action]
                    properties:
                      ban: { $ref: '#/components/schemas/CreatorUserBanDto' }
                      action: { $ref: '#/components/schemas/ModerationActionDto' }

  /creator/rooms/{roomId}/moderation/unban:
    post:
      operationId: unbanCreatorUser
      summary: Remove a creator-level viewer ban
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ModerateUserInput' }
      responses:
        '200':
          description: Viewer unbanned
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [action]
                    properties:
                      action: { $ref: '#/components/schemas/ModerationActionDto' }

  /creator/rooms/{roomId}/moderation/reward:
    post:
      operationId: rewardRoomUser
      summary: Reward a viewer with a shoutout or creator VIP marker
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/RewardUserInput' }
      responses:
        '200':
          description: Viewer rewarded
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [reward, action]
                    properties:
                      reward: { $ref: '#/components/schemas/CreatorUserRewardDto' }
                      action: { $ref: '#/components/schemas/ModerationActionDto' }

  /creator/rooms/{roomId}/messages/{messageId}:
    delete:
      operationId: deleteRoomMessage
      summary: Soft-delete a room chat message
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Message deleted
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [message, action]
                    properties:
                      message: { $ref: '#/components/schemas/ChatMessageDto' }
                      action: { $ref: '#/components/schemas/ModerationActionDto' }

  /creator/rooms/{roomId}/messages/{messageId}/pin:
    post:
      operationId: pinRoomMessage
      summary: Pin a room chat message
      tags: [streamer-moderation]
      parameters:
        - in: path
          name: roomId
          required: true
          schema: { type: string }
        - in: path
          name: messageId
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Message pinned
          content:
            application/json:
              schema:
                type: object
                required: [data]
                properties:
                  data:
                    type: object
                    required: [settings, action]
                    properties:
                      settings: { $ref: '#/components/schemas/RoomChatSettingsDto' }
