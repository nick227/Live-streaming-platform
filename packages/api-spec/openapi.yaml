      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              nullable: true
              type: object
              required: [file, type]
              properties:
                file:
                  type: string
                  format: binary
                type:
                  type: string
                  enum: [AVATAR, LOGO, BANNER, ROOM_COVER]
